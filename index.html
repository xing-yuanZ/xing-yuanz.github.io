<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JChat - 即时通讯</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            height: 100vh;
            overflow: hidden;
        }

        /* 登录/注册页面 */
        .auth-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 28px;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .auth-card input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 16px;
        }

        .auth-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
        }

        .error-msg {
            color: #e53e3e;
            font-size: 13px;
            text-align: center;
            margin-bottom: 16px;
        }

        /* 主应用布局 */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-nav {
            background: white;
            border-bottom: 1px solid #eef2f6;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .nav-item {
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 500;
            color: #5b677b;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }

        .nav-item.active {
            color: #007aff;
            border-bottom-color: #007aff;
        }

        .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logout-btn {
            background: #ef4444;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .friend-item, .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: #e9ecef;
        }

        .info {
            flex: 1;
        }

        .name {
            font-weight: 600;
        }

        button {
            background: #007aff;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .messages-area {
            max-height: 55vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
        }

        .message.sent {
            align-self: flex-end;
            background: #007aff;
            color: white;
        }

        .message.received {
            align-self: flex-start;
            background: #e9ecef;
        }

        .profile-header {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .profile-avatar-lg {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        .home-announcement {
            background: linear-gradient(135deg, #fff7e5 0%, #ffe8c7 100%);
            border-radius: 32px;
            padding: 32px 40px;
            margin-bottom: 32px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .home-announcement .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .home-announcement .text {
            font-size: 1.3rem;
            line-height: 1.5;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eef2f6;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            margin-bottom: 12px;
        }
        .danger-btn {
            background: #ef4444;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // ==================== Supabase 配置 ====================
    const SUPABASE_URL = 'https://cxilodvbdhtxtrldoswl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_36lHK24HL6drOmuhSTTv8g_w2n0fU5H';
    // ======================================================

    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const EMAIL_SUFFIX = '@jchat.local';

    let currentUser = null;
    let currentProfile = null;
    let currentView = 'home';
    let currentChatUser = null;
    let messagesSub = null;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // 确保用户 profile 存在
    async function ensureProfile(user, username) {
        const { data } = await _supabase.from('public_profiles').select('id').eq('id', user.id).maybeSingle();
        if (!data) {
            await _supabase.from('public_profiles').insert({
                id: user.id,
                email: user.email,
                display_name: username,
                is_admin: false,
                is_muted: false,
                bio: ''
            });
        }
    }

    // ==================== 认证页面 ====================
    function renderAuth() {
        return `
            <div class="auth-page">
                <div class="auth-card">
                    <h2>JChat</h2>
                    <div id="auth-error" class="error-msg"></div>
                    <input type="text" id="auth-username" placeholder="用户名" autocomplete="username">
                    <input type="password" id="auth-password" placeholder="密码" autocomplete="current-password">
                    <button id="auth-submit">登录</button>
                    <div class="auth-switch" id="auth-switch">没有账号？立即注册</div>
                </div>
            </div>
        `;
    }

    let authIsLogin = true;
    function attachAuthEvents() {
        const submit = document.getElementById('auth-submit');
        const switchBtn = document.getElementById('auth-switch');
        const errorDiv = document.getElementById('auth-error');

        async function handleAuth() {
            errorDiv.innerText = '';
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!username || !password) {
                errorDiv.innerText = '请填写用户名和密码';
                return;
            }
            if (authIsLogin) {
                // 登录
                const { data: profile } = await _supabase.from('public_profiles').select('email').eq('display_name', username).maybeSingle();
                if (!profile) { errorDiv.innerText = '用户名不存在'; return; }
                const { error } = await _supabase.auth.signInWithPassword({ email: profile.email, password });
                if (error) { errorDiv.innerText = error.message; return; }
                const { data: { user } } = await _supabase.auth.getUser();
                currentUser = user;
                await ensureProfile(currentUser, username);
                renderApp();
            } else {
                // 注册
                const { data: existing } = await _supabase.from('public_profiles').select('id').eq('display_name', username).maybeSingle();
                if (existing) { errorDiv.innerText = '用户名已被占用'; return; }
                const randomEmail = crypto.randomUUID() + EMAIL_SUFFIX;
                const { data, error } = await _supabase.auth.signUp({ email: randomEmail, password });
                if (error) { errorDiv.innerText = error.message; return; }
                if (data.user) {
                    currentUser = data.user;
                    await _supabase.from('public_profiles').insert({
                        id: currentUser.id,
                        email: randomEmail,
                        display_name: username,
                        is_admin: false,
                        is_muted: false,
                        bio: ''
                    });
                    renderApp();
                } else {
                    errorDiv.innerText = '注册失败';
                }
            }
        }
        submit.onclick = handleAuth;
        switchBtn.onclick = () => {
            authIsLogin = !authIsLogin;
            submit.innerText = authIsLogin ? '登录' : '注册';
            switchBtn.innerText = authIsLogin ? '没有账号？立即注册' : '已有账号？去登录';
            errorDiv.innerText = '';
        };
    }

    // ==================== 主应用渲染 ====================
    async function renderApp() {
        const { data: profile } = await _supabase.from('public_profiles').select('*').eq('id', currentUser.id).single();
        currentProfile = profile;

        let mainHtml = '';
        if (currentView === 'home') mainHtml = await renderHome();
        else if (currentView === 'chat') mainHtml = await renderChat();
        else if (currentView === 'friends') mainHtml = await renderFriends();
        else if (currentView === 'profile') mainHtml = await renderMyProfile();
        else if (currentView === 'settings') mainHtml = renderSettings();
        else if (currentView === 'admin' && currentProfile.is_admin) mainHtml = await renderAdmin();

        const navItems = [
            { id: 'home', label: '🏠 主页' },
            { id: 'chat', label: '💬 聊天' },
            { id: 'friends', label: '👥 好友' },
            { id: 'profile', label: '😀 我的主页' },
            { id: 'settings', label: '⚙️ 设置' }
        ];
        if (currentProfile.is_admin) navItems.push({ id: 'admin', label: '🔧 管理' });

        const navHtml = navItems.map(item => `
            <div class="nav-item ${currentView === item.id ? 'active' : ''}" data-view="${item.id}">${item.label}</div>
        `).join('');

        const appHtml = `
            <div class="app-container">
                <div class="top-nav">
                    ${navHtml}
                    <div class="user-info">
                        <span>${escapeHtml(currentProfile.display_name)}</span>
                        <button class="logout-btn" id="logout-btn">退出</button>
                    </div>
                </div>
                <div class="main-content">${mainHtml}</div>
            </div>
        `;
        document.getElementById('root').innerHTML = appHtml;

        // 绑定导航
        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', () => {
                currentView = el.dataset.view;
                currentChatUser = null;
                if (messagesSub) messagesSub.unsubscribe();
                renderApp();
            });
        });
        document.getElementById('logout-btn').onclick = async () => {
            await _supabase.auth.signOut();
            currentUser = null;
            if (messagesSub) messagesSub.unsubscribe();
            renderRoot();
        };

        // 子页面事件绑定
        if (currentView === 'chat') {
            attachChatEvents();
            subscribeMessages();
        } else if (currentView === 'friends') {
            attachFriendEvents();
        } else if (currentView === 'settings') {
            attachSettingsEvents();
        } else if (currentView === 'admin' && currentProfile.is_admin) {
            attachAdminEvents();
        }
    }

    // ==================== 主页 ====================
    async function renderHome() {
        const { data: ann } = await _supabase.from('announcements').select('content').order('created_at', { ascending: false }).limit(1);
        const announcement = ann?.[0]?.content || '欢迎使用 JChat，一个安全私密的即时通讯平台！';
        return `
            <div class="home-announcement">
                <div class="icon">📢</div>
                <div class="text">${escapeHtml(announcement)}</div>
            </div>
        `;
    }

    // ==================== 聊天 ====================
    async function renderChat() {
        // 获取好友列表
        const { data: friendships } = await _supabase
            .from('friendships')
            .select('user_id, friend_id')
            .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
            .eq('status', 'accepted');
        let friendIds = [];
        friendships?.forEach(f => {
            if (f.user_id === currentUser.id) friendIds.push(f.friend_id);
            else friendIds.push(f.user_id);
        });
        let friends = [];
        if (friendIds.length) {
            const { data } = await _supabase.from('public_profiles').select('id, display_name, avatar_url').in('id', friendIds);
            friends = data || [];
        }
        const friendListHtml = friends.map(f => `
            <div class="contact-item" data-user-id="${f.id}" data-name="${escapeHtml(f.display_name)}">
                <img class="avatar" src="${f.avatar_url || 'https://via.placeholder.com/48'}" onerror="this.src='https://via.placeholder.com/48'">
                <div class="info"><div class="name">${escapeHtml(f.display_name)}</div></div>
            </div>
        `).join('');
        const chatArea = currentChatUser ? await renderChatArea() : '<div class="card" style="text-align:center;">选择一个好友开始聊天</div>';
        return `
            <div style="display:flex; flex-direction:column; gap:20px;">
                <div class="card"><div style="font-weight:600; margin-bottom:12px;">好友列表</div>${friendListHtml || '<div>暂无好友，请先去“好友”页面添加</div>'}</div>
                ${chatArea}
            </div>
        `;
    }

    async function renderChatArea() {
        if (!currentChatUser) return '';
        const { data: messages } = await _supabase
            .from('messages')
            .select('*')
            .or(`and(from_user_id.eq.${currentUser.id},to_user_id.eq.${currentChatUser.id}),and(from_user_id.eq.${currentChatUser.id},to_user_id.eq.${currentUser.id})`)
            .order('created_at', { ascending: true });
        const msgsHtml = messages?.map(m => `
            <div class="message ${m.from_user_id === currentUser.id ? 'sent' : 'received'}">${escapeHtml(m.content)}</div>
        `).join('') || '';
        return `
            <div class="card">
                <div style="font-weight:600; margin-bottom:16px;">与 ${escapeHtml(currentChatUser.display_name)} 聊天</div>
                <div class="messages-area" id="chat-messages-area">${msgsHtml}</div>
                <div style="display:flex; gap:12px;">
                    <input type="text" id="chat-input" placeholder="输入消息..." style="flex:1;">
                    <button id="chat-send">发送</button>
                </div>
            </div>
        `;
    }

    function attachChatEvents() {
        document.querySelectorAll('.contact-item').forEach(el => {
            el.onclick = () => {
                currentChatUser = { id: el.dataset.userId, display_name: el.dataset.name };
                renderApp();
            };
        });
        const sendBtn = document.getElementById('chat-send');
        const input = document.getElementById('chat-input');
        if (sendBtn && input) {
            const send = async () => {
                const content = input.value.trim();
                if (!content || !currentChatUser) return;
                if (currentProfile.is_muted) { alert('你已被禁言'); return; }
                await _supabase.from('messages').insert({
                    from_user_id: currentUser.id,
                    to_user_id: currentChatUser.id,
                    content
                });
                input.value = '';
                const area = document.getElementById('chat-messages-area');
                if (area) {
                    const div = document.createElement('div');
                    div.className = 'message sent';
                    div.innerText = content;
                    area.appendChild(div);
                    area.scrollTop = area.scrollHeight;
                }
            };
            sendBtn.onclick = send;
            input.onkeypress = e => { if (e.key === 'Enter') send(); };
        }
    }

    function subscribeMessages() {
        if (messagesSub) messagesSub.unsubscribe();
        messagesSub = _supabase
            .channel('new-msg')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `to_user_id=eq.${currentUser.id}` }, payload => {
                if (currentChatUser && payload.new.from_user_id === currentChatUser.id) {
                    const area = document.getElementById('chat-messages-area');
                    if (area) {
                        const div = document.createElement('div');
                        div.className = 'message received';
                        div.innerText = payload.new.content;
                        area.appendChild(div);
                        area.scrollTop = area.scrollHeight;
                    }
                }
            })
            .subscribe();
    }

    // ==================== 好友 ====================
    async function renderFriends() {
        // 待处理请求
        const { data: requests } = await _supabase.from('friendships').select('id, user_id').eq('friend_id', currentUser.id).eq('status', 'pending');
        let requestUsers = [];
        if (requests?.length) {
            const { data } = await _supabase.from('public_profiles').select('id, display_name').in('id', requests.map(r => r.user_id));
            requestUsers = data || [];
        }
        const requestsHtml = requestUsers.map(r => `
            <div class="friend-item" data-request-id="${requests.find(req => req.user_id === r.id).id}" data-user-id="${r.id}">
                <div class="info">${escapeHtml(r.display_name)} 请求添加好友</div>
                <button class="accept-friend">接受</button>
                <button class="reject-friend" style="background:#aaa;">拒绝</button>
            </div>
        `).join('');
        // 已有好友
        const { data: friendships } = await _supabase.from('friendships').select('user_id, friend_id').or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`).eq('status', 'accepted');
        let fids = [];
        friendships?.forEach(f => {
            if (f.user_id === currentUser.id) fids.push(f.friend_id);
            else fids.push(f.user_id);
        });
        let friends = [];
        if (fids.length) {
            const { data } = await _supabase.from('public_profiles').select('id, display_name, avatar_url').in('id', fids);
            friends = data || [];
        }
        const friendsHtml = friends.map(f => `
            <div class="friend-item">
                <img class="avatar" src="${f.avatar_url || 'https://via.placeholder.com/48'}">
                <div class="info">${escapeHtml(f.display_name)}</div>
            </div>
        `).join('');
        return `
            <div class="card"><h3>好友请求</h3>${requestsHtml || '<div>暂无</div>'}</div>
            <div class="card"><h3>我的好友</h3>${friendsHtml || '<div>暂无好友</div>'}</div>
            <div class="card"><h3>添加好友</h3><input id="add-friend-name" placeholder="输入用户名"><button id="search-add">搜索并添加</button></div>
        `;
    }

    function attachFriendEvents() {
        document.querySelectorAll('.accept-friend').forEach(btn => {
            btn.onclick = async () => {
                const requestId = btn.closest('.friend-item').dataset.requestId;
                await _supabase.from('friendships').update({ status: 'accepted' }).eq('id', requestId);
                renderApp();
            };
        });
        document.querySelectorAll('.reject-friend').forEach(btn => {
            btn.onclick = async () => {
                const requestId = btn.closest('.friend-item').dataset.requestId;
                await _supabase.from('friendships').delete().eq('id', requestId);
                renderApp();
            };
        });
        const searchBtn = document.getElementById('search-add');
        if (searchBtn) {
            searchBtn.onclick = async () => {
                const username = document.getElementById('add-friend-name').value.trim();
                if (!username) return;
                const { data: user } = await _supabase.from('public_profiles').select('id').eq('display_name', username).maybeSingle();
                if (!user) { alert('用户不存在'); return; }
                if (user.id === currentUser.id) { alert('不能添加自己'); return; }
                const { data: existing } = await _supabase.from('friendships').select('status').or(`and(user_id.eq.${currentUser.id},friend_id.eq.${user.id}),and(user_id.eq.${user.id},friend_id.eq.${currentUser.id})`).maybeSingle();
                if (existing) { alert('已经是好友或已发送请求'); return; }
                await _supabase.from('friendships').insert({ user_id: currentUser.id, friend_id: user.id, status: 'pending' });
                alert('好友申请已发送');
                renderApp();
            };
        }
    }

    // ==================== 我的主页 ====================
    async function renderMyProfile() {
        return `
            <div class="card">
                <div class="profile-header">
                    <img class="profile-avatar-lg" src="${currentProfile.avatar_url || 'https://via.placeholder.com/100'}" onerror="this.src='https://via.placeholder.com/100'">
                    <div>
                        <div style="font-size:26px; font-weight:600;">${escapeHtml(currentProfile.display_name)}</div>
                        <div>${currentProfile.is_admin ? '管理员' : '普通用户'}</div>
                        ${currentProfile.is_muted ? '<div style="color:red;">⛔ 禁言中</div>' : ''}
                    </div>
                </div>
                <div><strong>简介</strong><br>${escapeHtml(currentProfile.bio || '这个人很懒，什么都没写')}</div>
                <div><strong>加入时间</strong><br>${new Date(currentProfile.created_at).toLocaleDateString()}</div>
            </div>
        `;
    }

    // ==================== 设置 ====================
    function renderSettings() {
        return `
            <div class="card"><h3>更改昵称</h3><input id="new-name" value="${escapeHtml(currentProfile.display_name)}"><button id="update-name">保存</button></div>
            <div class="card"><h3>修改密码</h3><input type="password" id="old-pwd" placeholder="当前密码"><input type="password" id="new-pwd" placeholder="新密码"><button id="update-pwd">更新密码</button></div>
            <div class="card"><h3>个人简介</h3><textarea id="bio-text" rows="2">${escapeHtml(currentProfile.bio || '')}</textarea><button id="update-bio">保存简介</button></div>
            <div class="card"><h3>上传头像</h3><input type="file" id="avatar-file" accept="image/*"><button id="upload-avatar">上传</button></div>
            <div class="card"><h3>危险区域</h3><button id="delete-account" class="danger-btn">永久删除账户</button></div>
        `;
    }

    function attachSettingsEvents() {
        document.getElementById('update-name')?.addEventListener('click', async () => {
            const newName = document.getElementById('new-name').value.trim();
            if (!newName) return;
            await _supabase.from('public_profiles').update({ display_name: newName }).eq('id', currentUser.id);
            alert('昵称已更新');
            renderApp();
        });
        document.getElementById('update-pwd')?.addEventListener('click', async () => {
            const old = document.getElementById('old-pwd').value;
            const newPwd = document.getElementById('new-pwd').value;
            if (!old || !newPwd) return;
            const { error } = await _supabase.auth.updateUser({ password: newPwd });
            if (error) alert(error.message);
            else alert('密码已修改，请重新登录');
        });
        document.getElementById('update-bio')?.addEventListener('click', async () => {
            const bio = document.getElementById('bio-text').value;
            await _supabase.from('public_profiles').update({ bio }).eq('id', currentUser.id);
            alert('简介已更新');
            renderApp();
        });
        document.getElementById('upload-avatar')?.addEventListener('click', async () => {
            const file = document.getElementById('avatar-file').files[0];
            if (!file) return;
            const ext = file.name.split('.').pop();
            const path = `${currentUser.id}/${Date.now()}.${ext}`;
            const { error: upErr } = await _supabase.storage.from('avatars').upload(path, file);
            if (upErr) { alert(upErr.message); return; }
            const { data: { publicUrl } } = _supabase.storage.from('avatars').getPublicUrl(path);
            await _supabase.from('public_profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
            alert('头像已更新');
            renderApp();
        });
        document.getElementById('delete-account')?.addEventListener('click', async () => {
            if (!confirm('永久删除所有数据？不可恢复！')) return;
            await _supabase.from('public_profiles').update({ deleted_at: new Date().toISOString() }).eq('id', currentUser.id);
            await _supabase.auth.signOut();
            currentUser = null;
            renderRoot();
        });
    }

    // ==================== 管理面板 ====================
    async function renderAdmin() {
        const { data: users } = await _supabase.from('public_profiles').select('*').is('deleted_at', null);
        const { data: ann } = await _supabase.from('announcements').select('content').order('created_at', { ascending: false }).limit(1);
        const currentAnn = ann?.[0]?.content || '';
        return `
            <div class="card"><h3>编辑公告</h3><textarea id="admin-announcement" rows="2">${escapeHtml(currentAnn)}</textarea><button id="save-announcement">保存公告</button></div>
            <div class="card"><h3>用户管理</h3><table style="width:100%"><tr><th>用户名</th><th>管理员</th><th>禁言</th><th>操作</th></tr>
            ${users?.map(u => `
                <tr>
                    <td>${escapeHtml(u.display_name)}</td>
                    <td>${u.is_admin ? '是' : `<button class="set-admin" data-id="${u.id}">设为管理员</button>`}</td>
                    <td>${u.is_muted ? '已禁言' : `<button class="toggle-mute" data-id="${u.id}">禁言</button>`}</td>
                    <td><button class="admin-del" data-id="${u.id}">删除</button></td>
                </tr>
            `).join('')}}</table></div>
            <div class="card"><h3>创建新用户</h3><input id="new-admin-name" placeholder="用户名"><input id="new-admin-pwd" placeholder="密码"><button id="admin-create-user">创建</button></div>
        `;
    }

    function attachAdminEvents() {
        // 保存公告
        document.getElementById('save-announcement')?.addEventListener('click', async () => {
            const content = document.getElementById('admin-announcement').value;
            if (!content) return;
            await _supabase.from('announcements').delete().neq('id', '00000000-0000-0000-0000-000000000000');
            await _supabase.from('announcements').insert({ content, created_by: currentUser.id });
            alert('公告已更新');
            renderApp();
        });
        // 设为管理员
        document.querySelectorAll('.set-admin').forEach(btn => {
            btn.onclick = async () => {
                const userId = btn.dataset.id;
                const { error } = await _supabase.from('public_profiles').update({ is_admin: true }).eq('id', userId);
                if (error) alert('操作失败: ' + error.message);
                else { alert('已设为管理员'); renderApp(); }
            };
        });
        // 禁言/解除禁言
        document.querySelectorAll('.toggle-mute').forEach(btn => {
            btn.onclick = async () => {
                const userId = btn.dataset.id;
                const { data: user } = await _supabase.from('public_profiles').select('is_muted').eq('id', userId).single();
                const newMuted = !user.is_muted;
                const { error } = await _supabase.from('public_profiles').update({ is_muted: newMuted }).eq('id', userId);
                if (error) alert('操作失败: ' + error.message);
                else { alert(newMuted ? '已禁言' : '已解除禁言'); renderApp(); }
            };
        });
        // 删除用户
        document.querySelectorAll('.admin-del').forEach(btn => {
            btn.onclick = async () => {
                if (!confirm('确定删除该用户？')) return;
                const userId = btn.dataset.id;
                const { error } = await _supabase.from('public_profiles').update({ deleted_at: new Date().toISOString() }).eq('id', userId);
                if (error) alert('删除失败: ' + error.message);
                else { alert('用户已删除'); renderApp(); }
            };
        });
        // 创建用户
        document.getElementById('admin-create-user')?.addEventListener('click', async () => {
            const username = document.getElementById('new-admin-name').value.trim();
            const pwd = document.getElementById('new-admin-pwd').value;
            if (!username || !pwd) { alert('请填写用户名和密码'); return; }
            const randomEmail = crypto.randomUUID() + EMAIL_SUFFIX;
            const { data, error } = await _supabase.auth.signUp({ email: randomEmail, password: pwd });
            if (error) { alert('创建失败: ' + error.message); return; }
            if (data.user) {
                await _supabase.from('public_profiles').insert({
                    id: data.user.id,
                    email: randomEmail,
                    display_name: username,
                    is_admin: false,
                    is_muted: false,
                    bio: ''
                });
                alert('用户创建成功');
                renderApp();
            }
        });
    }

    // ==================== 根路由 ====================
    async function renderRoot() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session?.user) {
            currentUser = session.user;
            const { data: profile } = await _supabase.from('public_profiles').select('display_name').eq('id', currentUser.id).maybeSingle();
            await ensureProfile(currentUser, profile?.display_name || 'user');
            renderApp();
        } else {
            document.getElementById('root').innerHTML = renderAuth();
            attachAuthEvents();
        }
    }

    renderRoot();
</script>
</body>
</html>
