<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JChat - 私聊助手</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #e5e7eb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
            display: flex;
            overflow: hidden;
        }
        .contacts-panel {
            width: 280px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .contacts-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }
        .contact-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .contact-item:hover { background: #eef2ff; }
        .contact-item.active { background: #e0e7ff; }
        .avatar {
            width: 40px; height: 40px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .contact-info { flex: 1; }
        .contact-name { font-weight: 500; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f9fafb;
        }
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .message.sent {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
        }
        .message.received {
            align-self: flex-start;
            background: white;
            border: 1px solid #e2e8f0;
        }
        .message-meta {
            font-size: 0.7rem;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
        }
        #messageInput {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            outline: none;
        }
        #sendBtn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
        }
        .auth-container h2 { margin-bottom: 24px; }
        .auth-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
        }
        .auth-container button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .switch-auth {
            text-align: center;
            font-size: 0.9rem;
            color: #3b82f6;
            cursor: pointer;
        }
        .error-msg { color: red; font-size: 0.8rem; margin-bottom: 12px; }
        .loading { text-align: center; padding: 20px; color: #6b7280; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ---------- 🔥 请替换成你自己的 Supabase 信息 ----------
    const SUPABASE_URL = 'https://cxilodvbdhtxtrldoswl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_36lHK24HL6drOmuhSTTv8g_w2n0fU5H';
    // -----------------------------------------------------

    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const EMAIL_SUFFIX = '@jchat.local';

    // 生成随机邮箱（UUID 格式，确保唯一）
    function generateRandomEmail() {
        return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Date.now() + EMAIL_SUFFIX;
    }

    let currentUser = null;
    let currentChatUser = null;
    let messagesSubscription = null;

    function render() {
        const app = document.getElementById('app');
        if (!currentUser) {
            app.innerHTML = renderAuth();
            attachAuthEvents();
        } else {
            renderMainApp();
        }
    }

    function renderAuth() {
        return `
            <div class="auth-container">
                <h2 id="auth-title">登录 JChat</h2>
                <div id="auth-error" class="error-msg"></div>
                <input type="text" id="username" placeholder="用户名" autocomplete="username">
                <input type="password" id="password" placeholder="密码" autocomplete="current-password">
                <button id="auth-submit">登录</button>
                <div class="switch-auth" id="switch-auth">没有账号？去注册</div>
            </div>
        `;
    }

    let isLogin = true;

    function attachAuthEvents() {
        const submitBtn = document.getElementById('auth-submit');
        const switchBtn = document.getElementById('switch-auth');
        const title = document.getElementById('auth-title');
        const errorDiv = document.getElementById('auth-error');

        function clearError() { errorDiv.innerText = ''; }

        submitBtn.onclick = async () => {
            clearError();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) {
                errorDiv.innerText = '请填写用户名和密码';
                return;
            }

            if (isLogin) {
                // 登录：先根据用户名获取邮箱
                const { data: profile, error: findError } = await _supabase
                    .from('public_profiles')
                    .select('email')
                    .eq('display_name', username)
                    .maybeSingle();
                if (findError || !profile) {
                    errorDiv.innerText = '用户名不存在';
                    return;
                }
                const email = profile.email;
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    errorDiv.innerText = error.message;
                } else {
                    currentUser = data.user;
                    await ensureProfile(currentUser, username);
                    render();
                }
            } else {
                // 注册：检查用户名是否已被占用
                const { data: existing, error: checkErr } = await _supabase
                    .from('public_profiles')
                    .select('id')
                    .eq('display_name', username)
                    .maybeSingle();
                if (existing) {
                    errorDiv.innerText = '用户名已被占用';
                    return;
                }
                // 生成随机唯一邮箱
                const randomEmail = generateRandomEmail() + EMAIL_SUFFIX;
                const { data, error } = await _supabase.auth.signUp({ email: randomEmail, password });
                if (error) {
                    errorDiv.innerText = error.message;
                } else if (data.user) {
                    currentUser = data.user;
                    // 将用户名和生成的邮箱存入 public_profiles
                    await _supabase.from('public_profiles').upsert({
                        id: currentUser.id,
                        email: randomEmail,
                        display_name: username
                    });
                    render();
                } else {
                    errorDiv.innerText = '注册失败，请重试';
                }
            }
        };

        switchBtn.onclick = () => {
            isLogin = !isLogin;
            title.innerText = isLogin ? '登录 JChat' : '注册 JChat';
            submitBtn.innerText = isLogin ? '登录' : '注册';
            switchBtn.innerText = isLogin ? '没有账号？去注册' : '已有账号？去登录';
            clearError();
        };
    }

    async function ensureProfile(user, username) {
        const { data, error } = await _supabase
            .from('public_profiles')
            .select('*')
            .eq('id', user.id)
            .maybeSingle();
        if (!data && !error) {
            // 如果 profile 不存在（比如旧数据），则创建一个
            await _supabase.from('public_profiles').insert({
                id: user.id,
                email: user.email,
                display_name: username
            });
        } else if (data && !data.display_name) {
            await _supabase.from('public_profiles').update({ display_name: username }).eq('id', user.id);
        }
    }

    async function renderMainApp() {
        const { data: profiles, error } = await _supabase
            .from('public_profiles')
            .select('*')
            .neq('id', currentUser.id);
        if (error) console.error(error);
        const contacts = (profiles || []).sort((a,b) => (a.display_name || '').localeCompare(b.display_name || ''));

        const chatHtml = currentChatUser ? renderChatArea() : '<div class="loading">选择一个联系人开始聊天</div>';

        const appHtml = `
            <div class="app-container">
                <div class="contacts-panel">
                    <div class="contacts-header">
                        <span>JChat · 联系人</span>
                        <button class="logout-btn" id="logout-btn">退出</button>
                    </div>
                    <div class="contacts-list" id="contacts-list">
                        ${contacts.map(contact => `
                            <div class="contact-item" data-user-id="${contact.id}">
                                <div class="avatar">${(contact.display_name || '?').charAt(0).toUpperCase()}</div>
                                <div class="contact-info">
                                    <div class="contact-name">${escapeHtml(contact.display_name || '未知')}</div>
                                </div>
                            </div>
                        `).join('')}
                        ${contacts.length === 0 ? '<div class="loading">暂无其他用户，快去邀请朋友注册吧</div>' : ''}
                    </div>
                </div>
                <div class="chat-panel" id="chat-panel">
                    ${chatHtml}
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = appHtml;

        document.querySelectorAll('.contact-item').forEach(el => {
            el.addEventListener('click', async () => {
                const userId = el.dataset.userId;
                const { data: profile } = await _supabase.from('public_profiles').select('*').eq('id', userId).single();
                if (profile) {
                    currentChatUser = profile;
                    renderMainApp();
                }
            });
        });

        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.onclick = async () => {
                await _supabase.auth.signOut();
                currentUser = null;
                currentChatUser = null;
                if (messagesSubscription) messagesSubscription.unsubscribe();
                render();
            };
        }

        if (currentChatUser) {
            await loadMessages();
            attachChatEvents();
            subscribeToMessages();
        }
    }

    function renderChatArea() {
        if (!currentChatUser) return '';
        const displayName = currentChatUser.display_name || '好友';
        return `
            <div class="chat-header">
                与 ${escapeHtml(displayName)} 的私聊
            </div>
            <div class="messages-area" id="messages-area">
                <div class="loading">加载消息中...</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
                <button id="sendBtn">发送</button>
            </div>
        `;
    }

    async function loadMessages() {
        if (!currentUser || !currentChatUser) return;
        const { data, error } = await _supabase
            .from('messages')
            .select('*')
            .or(`from_user_id.eq.${currentUser.id},to_user_id.eq.${currentUser.id}`)
            .order('created_at', { ascending: true });
        if (error) {
            console.error(error);
            return;
        }
        const relevant = data.filter(m => 
            (m.from_user_id === currentUser.id && m.to_user_id === currentChatUser.id) ||
            (m.from_user_id === currentChatUser.id && m.to_user_id === currentUser.id)
        );
        const messagesArea = document.getElementById('messages-area');
        if (messagesArea) {
            if (relevant.length === 0) {
                messagesArea.innerHTML = '<div class="loading">暂无消息，发一条吧～</div>';
            } else {
                messagesArea.innerHTML = '';
                relevant.forEach(msg => {
                    const isSent = msg.from_user_id === currentUser.id;
                    displayMessageElement(msg.content, isSent);
                });
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        }
    }

    function displayMessageElement(content, isSent) {
        const messagesArea = document.getElementById('messages-area');
        if (!messagesArea) return;
        const div = document.createElement('div');
        div.className = `message ${isSent ? 'sent' : 'received'}`;
        div.innerHTML = `<div class="message-meta">${isSent ? '我' : '对方'}</div><div>${escapeHtml(content)}</div>`;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        if (!content) return;
        if (!currentChatUser) return;
        const { error } = await _supabase.from('messages').insert({
            from_user_id: currentUser.id,
            to_user_id: currentChatUser.id,
            content: content
        });
        if (error) {
            alert('发送失败: ' + error.message);
        } else {
            input.value = '';
            displayMessageElement(content, true);
        }
    }

    function attachChatEvents() {
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('messageInput');
        if (sendBtn) sendBtn.onclick = sendMessage;
        if (msgInput) {
            msgInput.onkeypress = (e) => {
                if (e.key === 'Enter') sendMessage();
            };
        }
    }

    function subscribeToMessages() {
        if (messagesSubscription) messagesSubscription.unsubscribe();
        if (!currentUser || !currentChatUser) return;
        messagesSubscription = _supabase
            .channel('private-messages')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'messages',
                filter: `to_user_id=eq.${currentUser.id}`
            }, (payload) => {
                const newMsg = payload.new;
                if (newMsg.from_user_id === currentChatUser.id) {
                    displayMessageElement(newMsg.content, false);
                }
            })
            .subscribe();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function checkSession() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session?.user) {
            currentUser = session.user;
            // 尝试从 profiles 中获取用户名
            const { data: profile } = await _supabase
                .from('public_profiles')
                .select('display_name')
                .eq('id', currentUser.id)
                .maybeSingle();
            const username = profile?.display_name || '用户';
            await ensureProfile(currentUser, username);
        }
        render();
    }

    checkSession();
</script>
</body>
</html>
