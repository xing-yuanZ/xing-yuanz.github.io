<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JChat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #e5e7eb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 全局样式省略，和之前类似，但会扩展以适应更多页面 */
        .app-container { width: 100%; max-width: 1400px; height: 90vh; background: white; border-radius: 28px; box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2); display: flex; overflow: hidden; }
        .sidebar { width: 280px; background: #f8fafc; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: white; border-bottom: 1px solid #e2e8f0; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .nav-menu { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 12px; cursor: pointer; transition: 0.2s; color: #1f2937; }
        .nav-item:hover { background: #eef2ff; }
        .nav-item.active { background: #e0e7ff; color: #3b82f6; }
        .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-header { padding: 20px; background: white; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
        .content-body { flex: 1; overflow-y: auto; padding: 20px; background: #f9fafb; }
        /* 其他样式复用之前，并新增管理表格、好友列表等 */
        .user-card, .friend-request-item, .user-list-item { padding: 12px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #3b82f6; }
        button { background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        button.danger { background: #ef4444; }
        button.secondary { background: #6b7280; }
        .announcement-box { background: #fef3c7; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .edit-mode textarea { width: 100%; margin-bottom: 8px; }
        .profile-view { display: flex; gap: 20px; align-items: center; }
        .profile-info { flex: 1; }
        .settings-form { max-width: 400px; }
        .settings-form input, .settings-form textarea { width: 100%; margin-bottom: 12px; padding: 8px; border-radius: 8px; border: 1px solid #ccc; }
        .loading { text-align: center; padding: 20px; color: #6b7280; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ---------- 🔥 请替换成你自己的 Supabase 信息 ----------
    const SUPABASE_URL = 'https://cxilodvbdhtxtrldoswl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_36lHK24HL6drOmuhSTTv8g_w2n0fU5H';
    // -----------------------------------------------------

    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const EMAIL_SUFFIX = '@jchat.local';

    // 全局状态
    let currentUser = null;         // 当前登录用户对象（来自 auth）
    let currentProfile = null;      // 当前用户的 profile（包含 is_admin 等）
    let currentView = 'chat';       // chat, friends, discover, profile, settings, admin, userpage
    let targetUserId = null;        // 用于查看他人主页时的目标用户ID
    let currentChatUser = null;
    let messagesSubscription = null;

    // 工具函数
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    async function ensureProfile(user, username) {
        const { data } = await _supabase.from('public_profiles').select('*').eq('id', user.id).maybeSingle();
        if (!data) {
            await _supabase.from('public_profiles').insert({
                id: user.id,
                email: user.email,
                display_name: username,
                is_admin: false,
                is_muted: false,
                avatar_url: null,
                bio: ''
            });
        }
    }

    // 渲染主入口
    async function render() {
        const app = document.getElementById('app');
        if (!currentUser) {
            app.innerHTML = renderAuth();
            attachAuthEvents();
            return;
        }
        // 加载当前用户的 profile
        const { data: profile } = await _supabase.from('public_profiles').select('*').eq('id', currentUser.id).single();
        currentProfile = profile;
        // 根据当前视图渲染
        let mainContent = '';
        if (currentView === 'chat') {
            mainContent = await renderChatView();
        } else if (currentView === 'friends') {
            mainContent = await renderFriendsView();
        } else if (currentView === 'discover') {
            mainContent = await renderDiscoverView();
        } else if (currentView === 'profile') {
            mainContent = await renderMyProfileView();
        } else if (currentView === 'settings') {
            mainContent = renderSettingsView();
        } else if (currentView === 'admin' && currentProfile?.is_admin) {
            mainContent = await renderAdminView();
        } else if (currentView === 'userpage' && targetUserId) {
            mainContent = await renderUserPage(targetUserId);
        }
        const sidebarHtml = renderSidebar();
        app.innerHTML = `
            <div class="app-container">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <span>JChat</span>
                        <button class="logout-btn" id="logout-btn" style="background:#ef4444;padding:4px 8px;">退出</button>
                    </div>
                    <div class="nav-menu">
                        <div class="nav-item ${currentView === 'chat' ? 'active' : ''}" data-view="chat">💬 聊天</div>
                        <div class="nav-item ${currentView === 'friends' ? 'active' : ''}" data-view="friends">👥 好友</div>
                        <div class="nav-item ${currentView === 'discover' ? 'active' : ''}" data-view="discover">🌟 发现</div>
                        <div class="nav-item ${currentView === 'profile' ? 'active' : ''}" data-view="profile">😀 个人主页</div>
                        <div class="nav-item ${currentView === 'settings' ? 'active' : ''}" data-view="settings">⚙️ 设置</div>
                        ${currentProfile?.is_admin ? `<div class="nav-item ${currentView === 'admin' ? 'active' : ''}" data-view="admin">🔧 管理面板</div>` : ''}
                    </div>
                </div>
                <div class="content-area">
                    <div class="content-header">${getHeaderTitle()}</div>
                    <div class="content-body" id="content-body">${mainContent}</div>
                </div>
            </div>
        `;
        document.getElementById('logout-btn').onclick = async () => {
            await _supabase.auth.signOut();
            currentUser = null;
            currentProfile = null;
            if (messagesSubscription) messagesSubscription.unsubscribe();
            render();
        };
        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', () => {
                currentView = el.dataset.view;
                targetUserId = null;
                currentChatUser = null;
                render();
            });
        });
        // 绑定子页面事件
        if (currentView === 'chat' && currentChatUser) {
            attachChatEvents();
            subscribeToMessages();
        }
        if (currentView === 'friends') attachFriendEvents();
        if (currentView === 'discover') attachDiscoverEvents();
        if (currentView === 'settings') attachSettingsEvents();
        if (currentView === 'admin' && currentProfile?.is_admin) attachAdminEvents();
    }

    function getHeaderTitle() {
        if (currentView === 'chat') return '聊天';
        if (currentView === 'friends') return '好友';
        if (currentView === 'discover') return '发现';
        if (currentView === 'profile') return '我的主页';
        if (currentView === 'settings') return '设置';
        if (currentView === 'admin') return '管理面板';
        if (currentView === 'userpage') return '用户主页';
        return 'JChat';
    }

    function renderSidebar() { return ''; } // 已在上方渲染

    // ---------- 认证界面 ----------
    function renderAuth() {
        return `
            <div class="auth-container">
                <h2 id="auth-title">登录 JChat</h2>
                <div id="auth-error" class="error-msg"></div>
                <input type="text" id="username" placeholder="用户名">
                <input type="password" id="password" placeholder="密码">
                <button id="auth-submit">登录</button>
                <div class="switch-auth" id="switch-auth">没有账号？去注册</div>
            </div>
        `;
    }

    let isLogin = true;
    function attachAuthEvents() {
        const submitBtn = document.getElementById('auth-submit');
        const switchBtn = document.getElementById('switch-auth');
        const title = document.getElementById('auth-title');
        const errorDiv = document.getElementById('auth-error');
        submitBtn.onclick = async () => {
            errorDiv.innerText = '';
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { errorDiv.innerText = '请填写用户名和密码'; return; }
            if (isLogin) {
                // 登录：根据用户名查邮箱
                const { data: profile, error: findErr } = await _supabase.from('public_profiles').select('email').eq('display_name', username).maybeSingle();
                if (findErr || !profile) { errorDiv.innerText = '用户名不存在'; return; }
                const { error } = await _supabase.auth.signInWithPassword({ email: profile.email, password });
                if (error) { errorDiv.innerText = error.message; return; }
                const { data: { user } } = await _supabase.auth.getUser();
                currentUser = user;
                await ensureProfile(currentUser, username);
                render();
            } else {
                // 注册：检查用户名是否唯一
                const { data: existing } = await _supabase.from('public_profiles').select('id').eq('display_name', username).maybeSingle();
                if (existing) { errorDiv.innerText = '用户名已被占用'; return; }
                const randomEmail = crypto.randomUUID() + EMAIL_SUFFIX;
                const { data, error } = await _supabase.auth.signUp({ email: randomEmail, password });
                if (error) { errorDiv.innerText = error.message; return; }
                if (data.user) {
                    currentUser = data.user;
                    await _supabase.from('public_profiles').insert({
                        id: currentUser.id,
                        email: randomEmail,
                        display_name: username,
                        is_admin: false,
                        is_muted: false,
                        bio: ''
                    });
                    render();
                }
            }
        };
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            title.innerText = isLogin ? '登录 JChat' : '注册 JChat';
            submitBtn.innerText = isLogin ? '登录' : '注册';
            switchBtn.innerText = isLogin ? '没有账号？去注册' : '已有账号？去登录';
            errorDiv.innerText = '';
        };
    }

    // ---------- 聊天视图 ----------
    async function renderChatView() {
        // 获取好友列表（status = accepted）
        const { data: friendships } = await _supabase
            .from('friendships')
            .select('user_id, friend_id')
            .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
            .eq('status', 'accepted');
        let friendIds = [];
        friendships?.forEach(f => {
            if (f.user_id === currentUser.id) friendIds.push(f.friend_id);
            else friendIds.push(f.user_id);
        });
        if (friendIds.length === 0) return '<div class="loading">暂无好友，请先添加好友</div>';
        const { data: friends } = await _supabase.from('public_profiles').select('id, display_name, avatar_url').in('id', friendIds);
        const friendListHtml = friends?.map(f => `
            <div class="contact-item" data-user-id="${f.id}">
                <img class="avatar-img" src="${f.avatar_url || 'https://via.placeholder.com/40'}" onerror="this.src='https://via.placeholder.com/40'">
                <div class="contact-info"><div class="contact-name">${escapeHtml(f.display_name)}</div></div>
            </div>
        `).join('') || '<div>暂无好友</div>';
        const chatAreaHtml = currentChatUser ? await renderChatArea() : '<div class="loading">选择一个好友开始聊天</div>';
        return `
            <div style="display:flex; height:100%; gap:16px;">
                <div style="width:260px; border-right:1px solid #e2e8f0; overflow-y:auto;">${friendListHtml}</div>
                <div style="flex:1; display:flex; flex-direction:column;">${chatAreaHtml}</div>
            </div>
        `;
    }

    async function renderChatArea() {
        if (!currentChatUser) return '';
        // 加载历史消息
        const { data: messages } = await _supabase
            .from('messages')
            .select('*')
            .or(`and(from_user_id.eq.${currentUser.id},to_user_id.eq.${currentChatUser.id}),and(from_user_id.eq.${currentChatUser.id},to_user_id.eq.${currentUser.id})`)
            .order('created_at', { ascending: true });
        const messagesHtml = messages?.map(m => `
            <div class="message ${m.from_user_id === currentUser.id ? 'sent' : 'received'}">
                <div>${escapeHtml(m.content)}</div>
            </div>
        `).join('') || '';
        return `
            <div class="chat-header">与 ${escapeHtml(currentChatUser.display_name)} 聊天</div>
            <div class="messages-area" id="messages-area" style="flex:1; overflow-y:auto; padding:16px;">${messagesHtml}</div>
            <div class="input-area"><input type="text" id="messageInput" placeholder="消息"><button id="sendBtn">发送</button></div>
        `;
    }

    async function attachChatEvents() {
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('messageInput');
        if (sendBtn) sendBtn.onclick = async () => {
            const content = msgInput.value.trim();
            if (!content || !currentChatUser) return;
            if (currentProfile?.is_muted) { alert('你已被禁言'); return; }
            await _supabase.from('messages').insert({ from_user_id: currentUser.id, to_user_id: currentChatUser.id, content });
            msgInput.value = '';
        };
        if (msgInput) msgInput.onkeypress = e => { if (e.key === 'Enter') sendBtn.click(); };
    }

    function subscribeToMessages() {
        if (messagesSubscription) messagesSubscription.unsubscribe();
        messagesSubscription = _supabase
            .channel('private-messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `to_user_id=eq.${currentUser.id}` }, payload => {
                if (currentChatUser && payload.new.from_user_id === currentChatUser.id) {
                    const area = document.getElementById('messages-area');
                    if (area) {
                        const div = document.createElement('div');
                        div.className = 'message received';
                        div.innerHTML = `<div>${escapeHtml(payload.new.content)}</div>`;
                        area.appendChild(div);
                        area.scrollTop = area.scrollHeight;
                    }
                }
            })
            .subscribe();
    }

    // 好友视图（管理好友申请）
    async function renderFriendsView() {
        // 收到的申请
        const { data: received } = await _supabase
            .from('friendships')
            .select('id, user_id, friend_id, status, created_at')
            .eq('friend_id', currentUser.id)
            .eq('status', 'pending');
        const senderIds = received?.map(r => r.user_id) || [];
        const { data: senders } = await _supabase.from('public_profiles').select('id, display_name').in('id', senderIds);
        const receivedHtml = senders?.map(s => `
            <div class="friend-request-item" data-request-id="${received.find(r => r.user_id === s.id).id}" data-user-id="${s.id}">
                ${escapeHtml(s.display_name)} 请求添加好友
                <button class="accept-friend">接受</button> <button class="reject-friend">拒绝</button>
            </div>
        `).join('') || '<div>暂无好友请求</div>';
        // 已添加好友列表
        const { data: friendships } = await _supabase
            .from('friendships')
            .select('user_id, friend_id')
            .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
            .eq('status', 'accepted');
        let friendIds = [];
        friendships?.forEach(f => {
            if (f.user_id === currentUser.id) friendIds.push(f.friend_id);
            else friendIds.push(f.user_id);
        });
        const { data: friends } = await _supabase.from('public_profiles').select('id, display_name').in('id', friendIds);
        const friendsHtml = friends?.map(f => `
            <div class="friend-item" data-user-id="${f.id}">${escapeHtml(f.display_name)}</div>
        `).join('') || '<div>暂无好友</div>';
        return `
            <div><h3>好友请求</h3>${receivedHtml}</div>
            <div style="margin-top:20px;"><h3>我的好友</h3>${friendsHtml}</div>
            <div style="margin-top:20px;"><h3>添加好友</h3><input type="text" id="search-username" placeholder="输入用户名"><button id="add-friend-btn">搜索并添加</button></div>
        `;
    }

    function attachFriendEvents() {
        document.querySelectorAll('.accept-friend').forEach(btn => {
            btn.onclick = async () => {
                const requestDiv = btn.closest('.friend-request-item');
                const requestId = requestDiv.dataset.requestId;
                await _supabase.from('friendships').update({ status: 'accepted' }).eq('id', requestId);
                render();
            };
        });
        document.querySelectorAll('.reject-friend').forEach(btn => {
            btn.onclick = async () => {
                const requestDiv = btn.closest('.friend-request-item');
                const requestId = requestDiv.dataset.requestId;
                await _supabase.from('friendships').delete().eq('id', requestId);
                render();
            };
        });
        const addBtn = document.getElementById('add-friend-btn');
        if (addBtn) {
            addBtn.onclick = async () => {
                const username = document.getElementById('search-username').value.trim();
                if (!username) return;
                const { data: user } = await _supabase.from('public_profiles').select('id').eq('display_name', username).maybeSingle();
                if (!user) { alert('用户不存在'); return; }
                if (user.id === currentUser.id) { alert('不能添加自己'); return; }
                // 检查是否已是好友或已有申请
                const { data: existing } = await _supabase
                    .from('friendships')
                    .select('status')
                    .or(`and(user_id.eq.${currentUser.id},friend_id.eq.${user.id}),and(user_id.eq.${user.id},friend_id.eq.${currentUser.id})`)
                    .maybeSingle();
                if (existing) {
                    if (existing.status === 'accepted') alert('已经是好友');
                    else if (existing.status === 'pending') alert('已有待处理的好友申请');
                    else alert('无法添加');
                    return;
                }
                await _supabase.from('friendships').insert({ user_id: currentUser.id, friend_id: user.id, status: 'pending' });
                alert('好友申请已发送');
                render();
            };
        }
    }

    // 发现视图（公告、用户搜索）
    async function renderDiscoverView() {
        const { data: announcements } = await _supabase.from('announcements').select('*').order('created_at', { ascending: false }).limit(1);
        const announcementHtml = announcements?.[0] ? `<div class="announcement-box">📢 公告：${escapeHtml(announcements[0].content)}</div>` : '<div class="announcement-box">暂无公告</div>';
        // 用户搜索框
        return `
            ${announcementHtml}
            <div><h3>查找用户</h3><input type="text" id="search-user" placeholder="用户名"><button id="search-user-btn">搜索</button></div>
            <div id="search-result"></div>
        `;
    }

    function attachDiscoverEvents() {
        const searchBtn = document.getElementById('search-user-btn');
        if (searchBtn) {
            searchBtn.onclick = async () => {
                const username = document.getElementById('search-user').value.trim();
                if (!username) return;
                const { data: users } = await _supabase.from('public_profiles').select('id, display_name, avatar_url, bio').ilike('display_name', `%${username}%`).neq('id', currentUser.id);
                const resultDiv = document.getElementById('search-result');
                if (!users || users.length === 0) { resultDiv.innerHTML = '<div>未找到用户</div>'; return; }
                resultDiv.innerHTML = users.map(u => `
                    <div class="user-card" data-user-id="${u.id}">
                        <img src="${u.avatar_url || 'https://via.placeholder.com/40'}" width="40" style="border-radius:50%">
                        <span>${escapeHtml(u.display_name)}</span>
                        <button class="view-profile-btn">查看主页</button>
                        <button class="send-friend-req">加好友</button>
                    </div>
                `).join('');
                document.querySelectorAll('.view-profile-btn').forEach(btn => {
                    btn.onclick = () => {
                        const userId = btn.closest('.user-card').dataset.userId;
                        targetUserId = userId;
                        currentView = 'userpage';
                        render();
                    };
                });
                document.querySelectorAll('.send-friend-req').forEach(btn => {
                    btn.onclick = async () => {
                        const userId = btn.closest('.user-card').dataset.userId;
                        const { data: existing } = await _supabase.from('friendships').select('status').or(`and(user_id.eq.${currentUser.id},friend_id.eq.${userId}),and(user_id.eq.${userId},friend_id.eq.${currentUser.id})`).maybeSingle();
                        if (existing) { alert('已是好友或已有申请'); return; }
                        await _supabase.from('friendships').insert({ user_id: currentUser.id, friend_id: userId, status: 'pending' });
                        alert('好友申请已发送');
                    };
                });
            };
        }
    }

    // 个人主页（自己的）
    async function renderMyProfileView() {
        const p = currentProfile;
        return `
            <div class="profile-view">
                <img src="${p.avatar_url || 'https://via.placeholder.com/100'}" width="100" style="border-radius:50%">
                <div class="profile-info">
                    <h3>${escapeHtml(p.display_name)}</h3>
                    <p>${escapeHtml(p.bio || '这个人很懒，什么都没写')}</p>
                    <p>注册时间: ${new Date(p.created_at).toLocaleDateString()}</p>
                </div>
            </div>
        `;
    }

    // 他人主页
    async function renderUserPage(userId) {
        const { data: userProfile } = await _supabase.from('public_profiles').select('*').eq('id', userId).single();
        if (!userProfile) return '<div>用户不存在</div>';
        // 判断是否是好友
        const { data: friendship } = await _supabase.from('friendships').select('status').or(`and(user_id.eq.${currentUser.id},friend_id.eq.${userId}),and(user_id.eq.${userId},friend_id.eq.${currentUser.id})`).maybeSingle();
        const isFriend = friendship?.status === 'accepted';
        return `
            <div class="profile-view">
                <img src="${userProfile.avatar_url || 'https://via.placeholder.com/100'}" width="100" style="border-radius:50%">
                <div class="profile-info">
                    <h3>${escapeHtml(userProfile.display_name)}</h3>
                    <p>${escapeHtml(userProfile.bio || '这个人很懒')}</p>
                    ${!isFriend ? '<button id="add-friend-from-profile">添加好友</button>' : '<span>✔ 好友</span>'}
                </div>
            </div>
        `;
    }

    function attachProfileEvents() {
        const addBtn = document.getElementById('add-friend-from-profile');
        if (addBtn && targetUserId) {
            addBtn.onclick = async () => {
                await _supabase.from('friendships').insert({ user_id: currentUser.id, friend_id: targetUserId, status: 'pending' });
                alert('好友申请已发送');
                render();
            };
        }
    }

    // 设置页面
    function renderSettingsView() {
        return `
            <div class="settings-form">
                <h3>修改名称</h3>
                <input type="text" id="new-name" placeholder="新昵称" value="${escapeHtml(currentProfile?.display_name || '')}">
                <button id="update-name">更新</button>
                <h3>修改密码</h3>
                <input type="password" id="old-pwd" placeholder="当前密码">
                <input type="password" id="new-pwd" placeholder="新密码">
                <button id="update-pwd">更新密码</button>
                <h3>修改简介</h3>
                <textarea id="new-bio" rows="3">${escapeHtml(currentProfile?.bio || '')}</textarea>
                <button id="update-bio">更新简介</button>
                <h3>上传头像</h3>
                <input type="file" id="avatar-file" accept="image/*">
                <button id="upload-avatar">上传</button>
                <h3>删除账户</h3>
                <button id="delete-account" class="danger">⚠️ 永久删除我的账户</button>
            </div>
        `;
    }

    function attachSettingsEvents() {
        document.getElementById('update-name')?.addEventListener('click', async () => {
            const newName = document.getElementById('new-name').value.trim();
            if (!newName) return;
            await _supabase.from('public_profiles').update({ display_name: newName }).eq('id', currentUser.id);
            alert('名称已更新');
            render();
        });
        document.getElementById('update-pwd')?.addEventListener('click', async () => {
            const oldPwd = document.getElementById('old-pwd').value;
            const newPwd = document.getElementById('new-pwd').value;
            if (!oldPwd || !newPwd) return;
            const { error } = await _supabase.auth.updateUser({ password: newPwd });
            if (error) alert(error.message);
            else alert('密码已更新，请重新登录');
        });
        document.getElementById('update-bio')?.addEventListener('click', async () => {
            const bio = document.getElementById('new-bio').value;
            await _supabase.from('public_profiles').update({ bio }).eq('id', currentUser.id);
            alert('简介已更新');
            render();
        });
        document.getElementById('upload-avatar')?.addEventListener('click', async () => {
            const file = document.getElementById('avatar-file').files[0];
            if (!file) return;
            const fileExt = file.name.split('.').pop();
            const fileName = `${currentUser.id}/${Date.now()}.${fileExt}`;
            const { error: uploadError } = await _supabase.storage.from('avatars').upload(fileName, file);
            if (uploadError) { alert(uploadError.message); return; }
            const { data: { publicUrl } } = _supabase.storage.from('avatars').getPublicUrl(fileName);
            await _supabase.from('public_profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
            alert('头像已更新');
            render();
        });
        document.getElementById('delete-account')?.addEventListener('click', async () => {
            if (!confirm('永久删除账户，所有数据将丢失，不可恢复。确定吗？')) return;
            // 软删除：标记 deleted_at，并禁用账号（实际删除 auth.user 需要更高权限，这里先软删除 profile 并登出）
            await _supabase.from('public_profiles').update({ deleted_at: new Date().toISOString() }).eq('id', currentUser.id);
            await _supabase.auth.signOut();
            currentUser = null;
            render();
        });
    }

    // 管理员面板
    async function renderAdminView() {
        const { data: users } = await _supabase.from('public_profiles').select('*').is('deleted_at', null);
        const userRows = users?.map(u => `
            <tr>
                <td>${escapeHtml(u.display_name)}</td>
                <td>${u.is_admin ? '是' : '否'}</td>
                <td>${u.is_muted ? '禁言中' : '正常'}</td>
                <td>
                    <button class="admin-toggle-mute" data-id="${u.id}" data-muted="${u.is_muted}">${u.is_muted ? '解除禁言' : '禁言'}</button>
                    <button class="admin-delete-user" data-id="${u.id}">删除账号</button>
                    <button class="admin-reset-pwd" data-id="${u.id}">重置密码(设为123456)</button>
                </td>
            </tr>
        `).join('');
        // 公告编辑区
        const { data: ann } = await _supabase.from('announcements').select('*').order('created_at', { ascending: false }).limit(1);
        const currentAnn = ann?.[0]?.content || '';
        return `
            <div><h3>公告管理</h3><textarea id="announcement-text" rows="3" style="width:100%">${escapeHtml(currentAnn)}</textarea><button id="save-announcement">保存公告</button></div>
            <div><h3>用户管理</h3><table border="1" style="width:100%; border-collapse:collapse;"><tr><th>用户名</th><th>管理员</th><th>状态</th><th>操作</th></tr>${userRows || ''}</table></div>
            <div><h3>创建新用户</h3><input id="new-user-name" placeholder="用户名"><input id="new-user-pwd" placeholder="密码"><button id="create-user-btn">创建用户</button></div>
        `;
    }

    function attachAdminEvents() {
        document.getElementById('save-announcement')?.addEventListener('click', async () => {
            const content = document.getElementById('announcement-text').value;
            if (!content) return;
            // 删除旧的，插入新的
            await _supabase.from('announcements').delete().neq('id', '00000000-0000-0000-0000-000000000000');
            await _supabase.from('announcements').insert({ content, created_by: currentUser.id });
            alert('公告已更新');
        });
        document.querySelectorAll('.admin-toggle-mute').forEach(btn => {
            btn.onclick = async () => {
                const userId = btn.dataset.id;
                const currentMuted = btn.dataset.muted === 'true';
                await _supabase.from('public_profiles').update({ is_muted: !currentMuted }).eq('id', userId);
                render();
            };
        });
        document.querySelectorAll('.admin-delete-user').forEach(btn => {
            btn.onclick = async () => {
                if (!confirm('永久删除用户所有数据？')) return;
                const userId = btn.dataset.id;
                // 删除 profile（级联删除会触发 auth.users？需要先删除 auth.users 但需要函数。这里简化：软删除并清空数据）
                await _supabase.from('public_profiles').update({ deleted_at: new Date().toISOString() }).eq('id', userId);
                // 删除相关消息和好友关系
                await _supabase.from('messages').delete().or(`from_user_id.eq.${userId},to_user_id.eq.${userId}`);
                await _supabase.from('friendships').delete().or(`user_id.eq.${userId},friend_id.eq.${userId}`);
                render();
            };
        });
        document.querySelectorAll('.admin-reset-pwd').forEach(btn => {
            btn.onclick = async () => {
                const userId = btn.dataset.id;
                // 重置密码需要知道用户的邮箱，通过 profile 获取 email
                const { data: profile } = await _supabase.from('public_profiles').select('email').eq('id', userId).single();
                if (!profile) return;
                // 调用 admin API 需要 service_role key，前端无法直接做，这里提供一个简化：发送重置邮件（但需要邮箱）。替代：在前端无法实现，我们改为显示提示。
                alert('由于安全限制，请在 Supabase Dashboard 中手动重置用户密码。');
            };
        });
        document.getElementById('create-user-btn')?.addEventListener('click', async () => {
            const username = document.getElementById('new-user-name').value.trim();
            const password = document.getElementById('new-user-pwd').value;
            if (!username || !password) return;
            const { data: existing } = await _supabase.from('public_profiles').select('id').eq('display_name', username).maybeSingle();
            if (existing) { alert('用户名已存在'); return; }
            const randomEmail = crypto.randomUUID() + EMAIL_SUFFIX;
            const { data, error } = await _supabase.auth.signUp({ email: randomEmail, password });
            if (error) { alert(error.message); return; }
            if (data.user) {
                await _supabase.from('public_profiles').insert({
                    id: data.user.id,
                    email: randomEmail,
                    display_name: username,
                    is_admin: false,
                    is_muted: false
                });
                alert('用户创建成功');
                render();
            }
        });
    }

    // 检查会话
    async function checkSession() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session?.user) {
            currentUser = session.user;
            const { data: profile } = await _supabase.from('public_profiles').select('display_name').eq('id', currentUser.id).maybeSingle();
            const username = profile?.display_name || 'user';
            await ensureProfile(currentUser, username);
        }
        render();
    }

    checkSession();
</script>
</body>
</html>
